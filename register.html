<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Account — Escrow R Us</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F2;--ink:#111009;--surface:#FFFFFF;--border:#E5E2DA;
  --muted:#918E86;--accent:#1B6B45;--accent2:#2D9B63;
  --accent-light:#E8F5EE;--warn:#D63B3B;
  --display:'Syne',sans-serif;--body:'DM Sans',sans-serif;
}
body{font-family:var(--body);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.logo{font-family:var(--display);font-size:1.2rem;font-weight:800;display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--ink);margin-bottom:2rem}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:grid;place-items:center}
.logo-mark svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:440px;box-shadow:0 4px 30px rgba(0,0,0,.06)}
.card-title{font-family:var(--display);font-size:1.6rem;font-weight:800;letter-spacing:-.04em;margin-bottom:.4rem}
.card-sub{font-size:.88rem;color:var(--muted);margin-bottom:2rem}
.field{margin-bottom:1.3rem}
.field label{display:block;font-size:.78rem;font-weight:600;margin-bottom:.5rem}
.field input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-family:var(--body);font-size:.9rem;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(45,155,99,.1)}
.field input::placeholder{color:var(--muted)}
.field-hint{font-size:.72rem;color:var(--muted);margin-top:.4rem}
.error-banner{display:none;background:rgba(214,59,59,.08);border:1px solid rgba(214,59,59,.25);border-radius:10px;padding:.9rem 1rem;margin-bottom:1.2rem;font-size:.84rem;color:var(--warn)}
.btn-submit{width:100%;padding:14px;border-radius:12px;background:var(--accent);color:#fff;font-family:var(--body);font-size:1rem;font-weight:700;border:none;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(27,107,69,.25);margin-top:.5rem}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(27,107,69,.35)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.terms-note{font-size:.72rem;color:var(--muted);text-align:center;margin-top:1rem;line-height:1.6}
.terms-note a{color:var(--accent);text-decoration:none}
.bottom-link{text-align:center;margin-top:1.5rem;font-size:.84rem;color:var(--muted)}
.bottom-link a{color:var(--accent);font-weight:600;text-decoration:none}
</style>
</head>
<body>

<a href="index.html" class="logo">
  <div class="logo-mark">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
  </div>
  Escrow R Us
</a>

<div class="card">
  <h1 class="card-title">Create your account</h1>
  <p class="card-sub">Start securing your social commerce deals in minutes.</p>

  <div class="error-banner" id="errorBanner"></div>

  <div class="field">
    <label>Full Name / Business Name *</label>
    <input type="text" id="fullName" placeholder="Adaeze's Boutique" autocomplete="name"/>
  </div>
  <div class="field">
    <label>Email Address *</label>
    <input type="email" id="email" placeholder="adaeze@gmail.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>WhatsApp / Phone Number *</label>
    <input type="tel" id="phone" placeholder="08012345678"/>
    <div class="field-hint">We'll send deal notifications here</div>
  </div>
  <div class="field">
    <label>Password *</label>
    <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password"/>
    <div class="field-hint">Minimum 8 characters</div>
  </div>

  <button class="btn-submit" id="registerBtn" onclick="register()">Create Account →</button>

  <p class="terms-note">
    By creating an account you agree to our <a href="#">Terms of Service</a>
    and <a href="#">Privacy Policy</a>.
  </p>

  <p class="bottom-link">
    Already have an account? <a href="login.html">Log in</a>
  </p>
</div>

<script>
const API_URL = 'https://escrowrus-server-production.up.railway.app'

// If already logged in, skip registration
if (localStorage.getItem('eru_token')) {
  window.location.href = 'dashboard.html'
}

async function register() {
  const full_name = document.getElementById('fullName').value.trim()
  const email     = document.getElementById('email').value.trim()
  const phone     = document.getElementById('phone').value.trim()
  const password  = document.getElementById('password').value

  const banner = document.getElementById('errorBanner')
  banner.style.display = 'none'

  // Basic client-side check
  if (!full_name || !email || !phone || !password) {
    banner.textContent = '⚠️  All fields are required.'
    banner.style.display = 'block'
    return
  }

  const btn = document.getElementById('registerBtn')
  btn.disabled = true
  btn.textContent = '⏳ Creating account...'

  try {
    // POST /api/auth/register
    // Server hashes the password, saves the vendor, returns a JWT token
    const res  = await fetch(`${API_URL}/api/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ full_name, email, password, phone })
    })
    const data = await res.json()

    if (!res.ok) {
      // Server rejected the registration — duplicate email, weak password, etc.
      banner.textContent = '⚠️  ' + (data.error || 'Registration failed.')
      banner.style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Create Account →'
      return
    }

    // ── SUCCESS ────────────────────────────────────────────────────
    // Server returned a token — save it and go straight to dashboard.
    // No separate login step needed.
    localStorage.setItem('eru_token', data.token)
    window.location.href = 'dashboard.html'

  } catch (err) {
    banner.textContent = '⚠️  Could not connect to the server. Is it running?'
    banner.style.display = 'block'
    btn.disabled = false
    btn.textContent = 'Create Account →'
  }
}
</script>
</body>
</html>
