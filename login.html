<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Log In — Escrow R Us</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F2;--ink:#111009;--surface:#FFFFFF;--border:#E5E2DA;
  --muted:#918E86;--accent:#1B6B45;--accent2:#2D9B63;
  --accent-light:#E8F5EE;--warn:#D63B3B;
  --display:'Syne',sans-serif;--body:'DM Sans',sans-serif;
}
body{font-family:var(--body);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.logo{font-family:var(--display);font-size:1.2rem;font-weight:800;display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--ink);margin-bottom:2rem}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:grid;place-items:center}
.logo-mark svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 4px 30px rgba(0,0,0,.06)}
.card-title{font-family:var(--display);font-size:1.6rem;font-weight:800;letter-spacing:-.04em;margin-bottom:.4rem}
.card-sub{font-size:.88rem;color:var(--muted);margin-bottom:2rem}
.field{margin-bottom:1.3rem}
.field label{display:block;font-size:.78rem;font-weight:600;margin-bottom:.5rem}
.field input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-family:var(--body);font-size:.9rem;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(45,155,99,.1)}
.field input::placeholder{color:var(--muted)}
.error-banner{display:none;background:rgba(214,59,59,.08);border:1px solid rgba(214,59,59,.25);border-radius:10px;padding:.9rem 1rem;margin-bottom:1.2rem;font-size:.84rem;color:var(--warn)}
.btn-submit{width:100%;padding:14px;border-radius:12px;background:var(--accent);color:#fff;font-family:var(--body);font-size:1rem;font-weight:700;border:none;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(27,107,69,.25);margin-top:.5rem}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(27,107,69,.35)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.bottom-link{text-align:center;margin-top:1.5rem;font-size:.84rem;color:var(--muted)}
.bottom-link a{color:var(--accent);font-weight:600;text-decoration:none}
.bottom-link a:hover{text-decoration:underline}
</style>
</head>
<body>

<a href="index.html" class="logo">
  <div class="logo-mark">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
  </div>
  Escrow R Us
</a>

<div class="card">
  <h1 class="card-title">Welcome back</h1>
  <p class="card-sub">Log in to manage your deals and payouts.</p>

  <div class="error-banner" id="errorBanner"></div>

  <div class="field">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="adaeze@gmail.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Your password" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') login()"/>
  </div>

  <button class="btn-submit" id="loginBtn" onclick="login()">Log In →</button>

  <p class="bottom-link">
    Don't have an account? <a href="register.html">Create one free</a>
  </p>
</div>

<script>
const API_URL = 'https://escrowrus-server-production.up.railway.app'

// If already logged in, go straight to dashboard
if (localStorage.getItem('eru_token')) {
  window.location.href = 'dashboard.html'
}

async function login() {
  const email    = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value

  const banner = document.getElementById('errorBanner')
  banner.style.display = 'none'

  if (!email || !password) {
    banner.textContent = '⚠️  Please enter your email and password.'
    banner.style.display = 'block'
    return
  }

  const btn = document.getElementById('loginBtn')
  btn.disabled = true
  btn.textContent = '⏳ Logging in...'

  try {
    // POST /api/auth/login
    // Server checks email + password, returns a JWT token if correct
    const res  = await fetch(`${API_URL}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    })
    const data = await res.json()

    if (!res.ok) {
      // Wrong credentials — server always says "Invalid email or password"
      // never reveals which part is wrong (security feature)
      banner.textContent = '⚠️  ' + (data.error || 'Login failed.')
      banner.style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Log In →'
      return
    }

    // ── SUCCESS ────────────────────────────────────────────────────
    // Save the JWT token to localStorage.
    // This is the ONLY thing we save in localStorage.
    // It acts as proof of identity for every future API call.
    // It expires in 7 days (set in routes/auth.js when the token was created).
    localStorage.setItem('eru_token', data.token)

    // Go to the dashboard
    window.location.href = 'dashboard.html'

  } catch (err) {
    banner.textContent = '⚠️  Could not connect to the server. Is it running?'
    banner.style.display = 'block'
    btn.disabled = false
    btn.textContent = 'Log In →'
  }
}
</script>
</body>
</html>
